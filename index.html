<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQUAD 3D | Universal Storyteller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        .font-comic { font-family: 'Bangers', cursive; letter-spacing: 0.05em; }
        
        body { 
            background-color: #020617; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- RESPONSIVE LAYOUT ENGINE --- */
        #app-shell {
            display: grid;
            height: 100vh;
            width: 100%;
        }

        @media (min-width: 1024px) { /* PC/Desktop */
            #app-shell { grid-template-columns: 350px 1fr; gap: 1.5rem; padding: 1.5rem; }
            #mobile-controls, #mobile-tabs { display: none !important; }
            #sidebar { display: flex !important; }
        }

        @media (min-width: 768px) and (max-width: 1023px) { /* Tablet */
            #app-shell { grid-template-columns: 300px 1fr; gap: 1rem; padding: 1rem; }
            #mobile-controls, #mobile-tabs { display: none !important; }
            #sidebar { display: flex !important; }
        }

        @media (max-width: 767px) { /* Mobile Phone */
            #app-shell { grid-template-columns: 1fr; }
            #sidebar { display: none !important; }
            #viewport { border-radius: 0; border-bottom: 4px solid black; }
            #mobile-controls, #mobile-tabs { display: flex; }
        }

        /* --- THE STAGE --- */
        #viewport {
            position: relative;
            background-color: #1e293b;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            border: 4px solid #000;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* --- MOVABLE ITEMS --- */
        .movable {
            position: absolute;
            cursor: move;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
            transform-origin: center center;
        }
        .movable.selected {
            outline: 5px dashed #06b6d4;
            outline-offset: 6px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 20px;
        }
        .movable img { 
            max-width: 280px; max-height: 380px; 
            pointer-events: none; 
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
        }

        /* --- FIX: GLITCH-FREE SPEECH BUBBLES --- */
        .speech-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            filter: drop-shadow(10px 10px 0px rgba(0,0,0,1));
        }
        .bubble-body {
            background: white;
            border: 5px solid black;
            border-radius: 35px;
            padding: 15px 25px;
            color: black;
            font-family: 'Bangers', cursive;
            font-size: 1.6rem;
            text-align: center;
            text-transform: uppercase;
            min-width: 100px;
            max-width: 300px;
            line-height: 1.1;
        }
        .bubble-tail-svg {
            margin-top: -6px;
            margin-left: 40px;
            width: 45px;
            height: 30px;
        }

        /* --- UI COMPONENTS --- */
        #onion-skin { position: absolute; inset: 0; z-index: 30; opacity: 0.3; pointer-events: none; display: none; background-size: cover; background-position: center; }
        #playback-overlay { position: absolute; inset: 0; z-index: 200; background: black; display: none; align-items: center; justify-content: center; }
        
        .timeline-thumb { 
            width: 100px; aspect-ratio: 4/5; border: 3px solid #0f172a; 
            border-radius: 12px; flex-shrink: 0; overflow: hidden; 
            position: relative; background: #1e293b;
        }
        .timeline-thumb.active { border-color: #06b6d4; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        .tab-btn.active { background: #06b6d4; color: black; border-color: #06b6d4; }
        .tool-panel { display: none; }
        .tool-panel.active { display: block; animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Floating Snap Button for Mobile */
        #snap-fab {
            position: absolute; right: 20px; bottom: 110px;
            width: 75px; height: 75px; border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.4);
            border: 4px solid #000; z-index: 100;
        }

        .section-card {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Guide Slider */
        .tutorial-slide {
            background: #1e293b;
            border: 4px solid #334155;
            border-radius: 40px;
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body onload="init()">

    <div id="app-shell">
        
        <!-- Sidebar (PC & Tablet) -->
        <aside id="sidebar" class="hidden flex-col gap-4 bg-slate-900 p-5 rounded-[45px] border border-slate-800 shadow-2xl overflow-y-auto">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                    <div class="bg-cyan-500 text-black px-3 py-1 rounded-lg font-black text-2xl italic font-comic">S</div>
                    <h1 class="text-2xl font-black italic text-white font-comic tracking-tight">SQUAD 3D</h1>
                </div>
            </div>

            <!-- Tab Switcher -->
            <nav class="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-slate-800">
                <button onclick="switchTab('studio')" class="sidebar-tab-btn tab-btn active flex-1 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all">STUDIO</button>
                <button onclick="switchTab('guide')" class="sidebar-tab-btn tab-btn flex-1 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all">MISSION</button>
            </nav>

            <!-- Studio Controls -->
            <div id="sidebar-controls" class="space-y-4">
                <div class="section-card space-y-3">
                    <h3 class="text-[10px] font-black uppercase text-cyan-400">1. Setup Scene</h3>
                    <button onclick="triggerUpload('bg')" class="w-full bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase border border-slate-700 hover:border-cyan-500">Upload Background</button>
                </div>

                <div class="section-card space-y-3">
                    <h3 class="text-[10px] font-black uppercase text-cyan-400">2. Action Figures</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="triggerUpload('charA')" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase border border-slate-700">Figure A</button>
                        <button onclick="triggerUpload('charB')" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase border border-slate-700">Figure B</button>
                    </div>
                </div>

                <div class="section-card space-y-3">
                    <h3 class="text-[10px] font-black uppercase text-cyan-400">3. Dialogue</h3>
                    <div class="flex gap-2">
                        <input id="speech-input-pc" type="text" placeholder="TALK..." class="flex-1 bg-black border-2 border-slate-800 rounded-xl px-4 py-2 text-xs font-black uppercase text-white outline-none">
                        <button onclick="addSpeechBubble('pc')" class="bg-cyan-600 px-4 rounded-xl font-black text-xl">+</button>
                    </div>
                </div>

                <div class="section-card space-y-3">
                    <div class="flex gap-2">
                        <button onclick="flipSelected()" class="flex-1 bg-slate-800 p-2.5 rounded-xl hover:bg-slate-700 border border-slate-700"><i data-lucide="flip-horizontal" class="w-5 h-5 mx-auto"></i></button>
                        <button onclick="deleteSelected()" class="flex-1 bg-red-900/20 text-red-500 p-2.5 rounded-xl border border-red-900/50"><i data-lucide="trash-2" class="w-5 h-5 mx-auto"></i></button>
                    </div>
                    <input type="range" id="size-slider-pc" min="0.2" max="3" step="0.1" value="1" oninput="updateScale(this.value)" class="w-full accent-cyan-500">
                </div>

                <button onclick="snapFrame()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-6 rounded-[30px] text-xl font-black uppercase shadow-xl active:scale-95 transition-all">SNAP FRAME</button>
            </div>

            <!-- Sticky Social Link -->
            <div class="mt-auto pt-4 border-t border-slate-800">
                <a href="https://www.facebook.com/share/1JQh5fGJiB/" target="_blank" class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl text-[11px] font-black uppercase text-white bg-blue-700 shadow-xl active:scale-95">
                    <i data-lucide="facebook" class="w-5 h-5"></i> JOIN THE SQUAD!
                </a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex flex-col gap-4 overflow-hidden h-full">
            
            <!-- Studio Area -->
            <div id="tab-content-studio" class="tab-content active flex-grow flex flex-col overflow-hidden">
                <div id="viewport" onpointerdown="handleStageDown(event)">
                    <div id="onion-skin"></div>
                    <div id="playback-overlay"><img id="playback-img" src="" class="max-w-full max-h-full"></div>
                    <div id="item-layer"></div>
                    
                    <div class="absolute top-4 left-4 flex items-center gap-2 bg-black/70 px-4 py-2 rounded-full border border-white/10 z-[60]">
                        <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                        <span id="frame-count" class="text-[11px] font-black uppercase text-white tracking-widest">0 Frames</span>
                    </div>

                    <button id="snap-fab" onclick="snapFrame()" class="md:hidden">
                        <i data-lucide="camera" class="w-8 h-8 text-white"></i>
                    </button>

                    <div class="absolute bottom-8 right-10 opacity-10 font-black italic text-7xl text-white pointer-events-none uppercase font-comic">SQUAD 3D</div>
                </div>

                <!-- Universal Timeline -->
                <div class="bg-slate-900 border-t border-slate-800 p-4 md:rounded-[40px] md:border md:m-2">
                    <div class="flex items-center gap-4 mb-4">
                        <button id="play-btn" onclick="togglePlay()" class="bg-emerald-500 text-black px-8 py-3 rounded-2xl font-black uppercase flex items-center gap-2 shadow-lg active:scale-95">
                            <i data-lucide="play" id="play-icon" class="w-4 h-4 fill-current"></i> <span class="text-xs">WATCH FILM</span>
                        </button>
                        <input type="range" min="1" max="12" value="4" class="w-24 accent-emerald-500" id="fps-slider">
                        <div class="ml-auto flex gap-3">
                            <button onclick="resetEverything()" class="text-[10px] font-black text-red-500 uppercase">Reset</button>
                            <button onclick="downloadFrames()" class="bg-slate-800 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-700">Export</button>
                        </div>
                    </div>
                    <div id="timeline" class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide min-h-[110px]">
                        <div id="empty-msg" class="w-full text-center text-[10px] text-slate-500 uppercase font-black opacity-40 py-10">Snap frames to begin!</div>
                    </div>
                </div>
            </div>

            <!-- Guide Area -->
            <div id="tab-content-guide" class="tab-content flex-grow overflow-y-auto p-6 md:p-12 space-y-8">
                <div id="guide-slider-container" class="relative h-[450px] max-w-2xl mx-auto w-full">
                    <!-- Slides injected by JS -->
                </div>
                <div class="flex justify-center items-center gap-8">
                    <button onclick="prevSlide()" class="bg-slate-800 p-5 rounded-full border border-slate-700 active:bg-cyan-500"><i data-lucide="chevron-left"></i></button>
                    <div id="slide-dots" class="flex gap-3"></div>
                    <button onclick="nextSlide()" class="bg-slate-800 p-5 rounded-full border border-slate-700 active:bg-cyan-500"><i data-lucide="chevron-right"></i></button>
                </div>
            </div>

            <!-- Mobile Only Command Center -->
            <div id="mobile-controls" class="bg-slate-900 border-t border-slate-800 p-4 pb-2">
                <div class="h-20 mb-3">
                    <div id="tool-panel-scene" class="tool-panel active">
                        <button onclick="triggerUpload('bg')" class="w-full bg-slate-800 py-4 rounded-2xl border-2 border-slate-700 text-[11px] font-black uppercase flex items-center justify-center gap-2">
                            <i data-lucide="image" class="w-5 h-5 text-cyan-400"></i> Change Scene
                        </button>
                    </div>
                    <div id="tool-panel-figures" class="tool-panel">
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="triggerUpload('charA')" class="bg-slate-800 py-4 rounded-2xl border-2 border-slate-700 text-[11px] font-black uppercase">Add Fig A</button>
                            <button onclick="triggerUpload('charB')" class="bg-slate-800 py-4 rounded-2xl border-2 border-slate-700 text-[11px] font-black uppercase">Add Fig B</button>
                        </div>
                    </div>
                    <div id="tool-panel-talk" class="tool-panel">
                        <div class="flex gap-2">
                            <input id="speech-input-mobile" type="text" placeholder="THEY SAY..." class="flex-1 bg-black border-2 border-slate-800 rounded-xl px-4 py-3 text-sm font-black uppercase text-white outline-none">
                            <button onclick="addSpeechBubble('mobile')" class="bg-cyan-600 px-6 rounded-xl font-black text-2xl">+</button>
                        </div>
                    </div>
                    <div id="tool-panel-edit" class="tool-panel">
                        <div class="flex items-center gap-3">
                            <button onclick="flipSelected()" class="bg-slate-800 p-4 rounded-xl border-2 border-slate-700"><i data-lucide="flip-horizontal"></i></button>
                            <button onclick="deleteSelected()" class="bg-red-900/20 text-red-500 p-4 rounded-xl border-2 border-red-900/50"><i data-lucide="trash-2"></i></button>
                            <input type="range" id="size-slider-mobile" min="0.2" max="3" step="0.1" value="1" oninput="updateScale(this.value)" class="flex-1 accent-cyan-500">
                        </div>
                    </div>
                </div>

                <div class="flex justify-around bg-black/40 p-1.5 rounded-[28px] border border-slate-800">
                    <button onclick="switchTool('scene')" id="tool-btn-scene" class="tool-btn active flex-1 py-3 rounded-2xl flex flex-col items-center gap-1">
                        <i data-lucide="layout" class="w-4 h-4"></i><span class="text-[7px] font-black uppercase">Scene</span>
                    </button>
                    <button onclick="switchTool('figures')" id="tool-btn-figures" class="tool-btn flex-1 py-3 rounded-2xl flex flex-col items-center gap-1">
                        <i data-lucide="users" class="w-4 h-4"></i><span class="text-[7px] font-black uppercase">Figures</span>
                    </button>
                    <button onclick="switchTool('talk')" id="tool-btn-talk" class="tool-btn flex-1 py-3 rounded-2xl flex flex-col items-center gap-1">
                        <i data-lucide="message-circle" class="w-4 h-4"></i><span class="text-[7px] font-black uppercase">Talk</span>
                    </button>
                    <button onclick="switchTool('edit')" id="tool-btn-edit" class="tool-btn flex-1 py-3 rounded-2xl flex flex-col items-center gap-1">
                        <i data-lucide="move" class="w-4 h-4"></i><span class="text-[7px] font-black uppercase">Adjust</span>
                    </button>
                </div>
            </div>

            <!-- Mobile Bottom Tab Navigation -->
            <nav id="mobile-tabs" class="bg-black border-t-2 border-slate-800 flex justify-around p-3 pb-8">
                <button onclick="switchTab('studio')" id="nav-studio" class="tab-btn active flex flex-col items-center gap-1 transition-colors">
                    <i data-lucide="clapperboard" class="w-6 h-6"></i>
                    <span class="text-[9px] font-black uppercase">Studio</span>
                </button>
                <button onclick="switchTab('guide')" id="nav-guide" class="tab-btn flex flex-col items-center gap-1 transition-colors">
                    <i data-lucide="help-circle" class="w-6 h-6"></i>
                    <span class="text-[9px] font-black uppercase">Guide</span>
                </button>
            </nav>

        </main>
    </div>

    <input id="file-upload" type="file" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
    <canvas id="snap-canvas" class="hidden"></canvas>

    <script>
        const MISSION_SLIDES = [
            { title: "🎬 START YOUR STORY", text: "Turn Action Figures into legends! Follow these steps to build your movie.", icon: "star", color: "text-yellow-400" },
            { title: "🎁 ACTION PACK", text: "Download characters and backgrounds for FREE! Click below to visit our vault.", icon: "package", color: "text-yellow-500", isResourceSlide: true },
            { title: "✨ MAGIC TOUCH", text: "On iPhone/iPad: Hold your finger on a photo of your toy to cut it out instantly!", icon: "wand-2", color: "text-cyan-400" },
            { title: "🎭 ANIMATE", text: "Move your characters a tiny bit, add a speech bubble, and hit SNAP. Build your movie frame by frame!", icon: "clapperboard", color: "text-red-400" },
            { title: "📱 JOIN THE SQUAD!", text: "Love the app? Follow SQUAD 3D on Facebook for community updates and packs!", icon: "facebook", color: "text-blue-400", isSocialSlide: true }
        ];

        let currentSlideIdx = 0;
        let selectedEl = null;
        let activePointerId = null;
        let dragOffset = { x: 0, y: 0 };
        let frames = [];
        let isPlaying = false;
        let playInterval = null;
        let zCounter = 100;

        function init() {
            lucide.createIcons();
            renderSlide();
            window.addEventListener('pointermove', handlePointerMove);
            window.addEventListener('pointerup', handlePointerUp);
        }

        // --- NAVIGATION ENGINE ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`tab-content-${tab}`).classList.add('active');
            
            // Sync both PC and Mobile tab buttons
            const tabBtns = document.querySelectorAll(tab === 'studio' ? '#tab-btn-studio, #nav-studio' : '#tab-btn-guide, #nav-guide');
            tabBtns.forEach(b => b.classList.add('active'));

            const mobileControls = document.getElementById('mobile-controls');
            if (mobileControls) mobileControls.style.display = (tab === 'studio') ? 'block' : 'none';
            
            lucide.createIcons();
        }

        function switchTool(tool) {
            document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tool-panel-${tool}`).classList.add('active');
            document.getElementById(`tool-btn-${tool}`).classList.add('active');
            lucide.createIcons();
        }

        // --- FILE UPLOAD ---
        let currentSlot = '';
        function triggerUpload(slot) { currentSlot = slot; document.getElementById('file-upload').click(); }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                if (currentSlot === 'bg') document.getElementById('viewport').style.backgroundImage = `url(${ev.target.result})`;
                else createMovableItem(`<img src="${ev.target.result}" draggable="false">`, currentSlot);
                e.target.value = '';
            };
            r.readAsDataURL(file);
        }

        // --- FIXED BUBBLE ENGINE ---
        function addSpeechBubble(context) {
            const inputId = context === 'pc' ? 'speech-input-pc' : 'speech-input-mobile';
            const val = document.getElementById(inputId).value;
            if (!val.trim()) return;

            const bubbleHTML = `
                <div class="speech-container">
                    <div class="bubble-body">${val}</div>
                    <svg class="bubble-tail-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <path d="M0,0 L100,0 L40,100 Z" fill="white" stroke="black" stroke-width="12" vector-effect="non-scaling-stroke" />
                    </svg>
                </div>
            `;
            createMovableItem(bubbleHTML, 'bubble');
            document.getElementById(inputId).value = '';
        }

        // --- MOVABLE ENGINE ---
        function createMovableItem(content, id) {
            const container = document.getElementById('item-layer');
            const el = document.createElement('div');
            el.className = "movable";
            el.innerHTML = content;
            el.style.left = "30%"; el.style.top = "25%";
            el.dataset.scale = 1; el.dataset.rotate = 0; el.dataset.flipped = "false";
            
            el.onpointerdown = (e) => {
                e.stopPropagation(); selectItem(el);
                zCounter++; el.style.zIndex = zCounter;
                activePointerId = e.pointerId;
                const rect = el.getBoundingClientRect();
                dragOffset.x = e.clientX - rect.left; dragOffset.y = e.clientY - rect.top;
                el.setPointerCapture(e.pointerId);
            };
            el.ondblclick = () => { if(confirm("Delete item?")) el.remove(); };
            container.appendChild(el);
            selectItem(el);
            applyTransform(el);
        }

        function selectItem(el) {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = el; selectedEl.classList.add('selected');
            document.getElementById('size-slider-pc').value = el.dataset.scale;
            const mSlider = document.getElementById('size-slider-mobile');
            if(mSlider) mSlider.value = el.dataset.scale;
            if (window.innerWidth < 768) switchTool('edit');
        }

        function handleStageDown() { if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; } }
        function handlePointerMove(e) {
            if (!selectedEl || activePointerId === null || e.pointerId !== activePointerId) return;
            const viewport = document.getElementById('viewport').getBoundingClientRect();
            selectedEl.style.left = (e.clientX - viewport.left - dragOffset.x) + 'px';
            selectedEl.style.top = (e.clientY - viewport.top - dragOffset.y) + 'px';
        }
        function handlePointerUp() { activePointerId = null; }

        function applyTransform(el) {
            const s = el.dataset.scale, r = el.dataset.rotate;
            const f = el.dataset.flipped === "true" ? -1 : 1;
            el.style.transform = `scale(${s * f}, ${s}) rotate(${r}deg)`;
        }
        function updateScale(v) { if(selectedEl) { selectedEl.dataset.scale = v; applyTransform(selectedEl); } }
        function flipSelected() { if(selectedEl) { selectedEl.dataset.flipped = selectedEl.dataset.flipped === "true" ? "false" : "true"; applyTransform(selectedEl); } }
        function deleteSelected() { if(selectedEl) { selectedEl.remove(); selectedEl = null; } }

        // --- SNAP & ANIMATE ---
        async function snapFrame() {
            if (isPlaying) togglePlay();
            const viewport = document.getElementById('viewport');
            const currentSelected = selectedEl;
            if (selectedEl) selectedEl.classList.remove('selected');
            
            const canvas = await html2canvas(viewport, { backgroundColor: null, scale: 1.5, useCORS: true });
            const data = canvas.toDataURL("image/png");
            frames.push(data);
            
            if (currentSelected) currentSelected.classList.add('selected');
            document.getElementById('onion-skin').style.backgroundImage = `url(${data})`;
            document.getElementById('onion-skin').style.display = 'block';
            document.getElementById('frame-count').innerText = `${frames.length} Frames`;
            
            const timeline = document.getElementById('timeline');
            const empty = document.getElementById('empty-msg');
            if (empty) empty.remove();
            
            const thumb = document.createElement('div');
            thumb.className = "timeline-thumb shadow-lg";
            thumb.innerHTML = `<img src="${data}" class="w-full h-full object-cover opacity-60">`;
            timeline.appendChild(thumb);
            timeline.scrollLeft = timeline.scrollWidth;
        }

        function togglePlay() {
            if (frames.length < 2) return;
            isPlaying = !isPlaying;
            const overlay = document.getElementById('playback-overlay');
            const img = document.getElementById('playback-img');
            const icon = document.getElementById('play-icon');
            if (isPlaying) {
                overlay.style.display = 'flex';
                icon.setAttribute('data-lucide', 'square'); lucide.createIcons();
                let i = 0;
                playInterval = setInterval(() => { img.src = frames[i]; i = (i + 1) % frames.length; }, 1000 / document.getElementById('fps-slider').value);
            } else {
                clearInterval(playInterval); overlay.style.display = 'none';
                icon.setAttribute('data-lucide', 'play'); lucide.createIcons();
            }
        }

        function resetEverything() {
            if(!confirm("Clear Movie?")) return;
            frames = []; document.getElementById('timeline').innerHTML = '';
            document.getElementById('item-layer').innerHTML = '';
            document.getElementById('onion-skin').style.display = 'none';
            document.getElementById('frame-count').innerText = '0 Frames';
            document.getElementById('viewport').style.backgroundImage = 'none';
        }

        function downloadFrames() {
            if (frames.length === 0) return;
            frames.forEach((f, i) => {
                const a = document.createElement('a');
                a.download = `squad3d_${i+1}.png`; a.href = f; a.click();
            });
        }

        // --- MISSION GUIDE ---
        function renderSlide() {
            const slide = MISSION_SLIDES[currentSlideIdx];
            const container = document.getElementById('guide-slider-container');
            let extra = '';
            if (slide.isResourceSlide) extra = `<a href="https://drive.google.com/drive/folders/1qkTtlDpseaDDngEzkgs1rQQIyhLg4zux?usp=drive_link" target="_blank" class="mt-6 bg-yellow-500 text-black px-8 py-4 rounded-3xl font-black uppercase text-lg shadow-xl active:scale-95 transition-all">Action Pack</a>`;
            if (slide.isSocialSlide) extra = `<a href="https://www.facebook.com/share/1JQh5fGJiB/" target="_blank" class="mt-6 bg-blue-600 px-8 py-4 rounded-3xl font-black uppercase text-lg shadow-xl active:scale-95 transition-all">Visit Facebook</a>`;

            container.innerHTML = `
                <div class="tutorial-slide shadow-2xl">
                    <div class="mb-6 bg-slate-800 p-10 rounded-full border-4 border-slate-700 shadow-xl">
                        <i data-lucide="${slide.icon}" class="w-16 h-16 ${slide.color}"></i>
                    </div>
                    <h2 class="text-3xl md:text-5xl font-comic uppercase mb-4 leading-tight">${slide.title}</h2>
                    <p class="text-slate-300 text-lg md:text-xl max-w-md">${slide.text}</p>
                    ${extra}
                </div>
            `;
            const dots = document.getElementById('slide-dots');
            dots.innerHTML = MISSION_SLIDES.map((_, i) => `<div class="w-3.5 h-3.5 rounded-full ${i === currentSlideIdx ? 'bg-cyan-500 scale-125' : 'bg-slate-700'} transition-all"></div>`).join('');
            lucide.createIcons();
        }
        function nextSlide() { currentSlideIdx = (currentSlideIdx + 1) % MISSION_SLIDES.length; renderSlide(); }
        function prevSlide() { currentSlideIdx = (currentSlideIdx - 1 + MISSION_SLIDES.length) % MISSION_SLIDES.length; renderSlide(); }
    </script>
</body>
</html>
