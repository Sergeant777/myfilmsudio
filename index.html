<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQUAD 3D | Storyteller Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        .font-comic { font-family: 'Bangers', cursive; letter-spacing: 0.05em; }
        
        body { 
            background-color: #020617; color: white; font-family: sans-serif; 
            overflow: hidden; touch-action: none; height: 100vh; margin: 0;
            display: flex; flex-direction: column;
        }

        #app-shell { display: grid; height: 100vh; width: 100%; overflow: hidden; }

        @media (min-width: 1024px) { #app-shell { grid-template-columns: 350px 1fr; gap: 1.5rem; padding: 1.5rem; } #mobile-controls, #mobile-tabs { display: none !important; } #sidebar { display: flex !important; } }
        @media (max-width: 1023px) { #app-shell { grid-template-columns: 1fr; grid-template-rows: 1fr auto auto; } #sidebar { display: none !important; } #viewport { border-radius: 0 !important; border: none !important; border-bottom: 4px solid #000 !important; } #mobile-controls, #mobile-tabs { display: flex; } }

        #viewport { position: relative; background-color: #1e293b; width: 100%; height: 100%; min-height: 250px; overflow: hidden; background-size: cover; background-position: center; border: 4px solid #000; border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        #playback-overlay { position: absolute; inset: 0; z-index: 1000; background: #000; display: none; align-items: center; justify-content: center; }
        #playback-img { width: 100%; height: 100%; object-fit: contain; }

        .movable { position: absolute; cursor: move; z-index: 40; display: flex; align-items: center; justify-content: center; user-select: none; touch-action: none; transform-origin: center center; }
        .movable.selected { outline: 5px dashed #06b6d4; outline-offset: 6px; background: rgba(6, 182, 212, 0.1); border-radius: 20px; }
        .movable img { max-width: 280px; max-height: 380px; pointer-events: none; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6)); }

        .speech-container { display: flex; flex-direction: column; align-items: flex-start; filter: drop-shadow(10px 10px 0px rgba(0,0,0,1)); }
        .bubble-body { background: white; border: 5px solid black; border-radius: 35px; padding: 15px 25px; color: black; font-family: 'Bangers', cursive; font-size: 1.6rem; text-align: center; text-transform: uppercase; min-width: 100px; max-width: 300px; line-height: 1.1; }
        .bubble-tail-svg { margin-top: -6px; margin-left: 40px; width: 45px; height: 30px; }

        #onion-skin { position: absolute; inset: 0; z-index: 30; opacity: 0.3; pointer-events: none; display: none; background-size: cover; background-position: center; }
        .timeline-thumb { width: 90px; aspect-ratio: 4/5; border: 3px solid #0f172a; border-radius: 12px; flex-shrink: 0; overflow: hidden; position: relative; background: #1e293b; }
        .timeline-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .timeline-thumb.active { border-color: #06b6d4; }
        
        .tab-btn.active { background: #06b6d4 !important; color: black !important; border-color: #06b6d4 !important; }
        .tool-panel { display: none; }
        .tool-panel.active { display: block; animation: slideUp 0.2s ease-out; }

        #snap-fab { position: absolute; right: 20px; bottom: 20px; width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, #f97316, #ea580c); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4); border: 4px solid #000; z-index: 100; transition: transform 0.1s; }
        #snap-fab:active { transform: scale(0.9); }
        .section-card { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Locking */
        .tier-locked { opacity: 0.2 !important; filter: grayscale(1) !important; pointer-events: none !important; position: relative; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #f97316; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 900; text-transform: uppercase; z-index: 2000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .mission-card-final { background: #1e293b; border: 4px solid #f97316; border-radius: 40px; padding: 2.5rem; text-align: center; max-width: 400px; margin: 0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
    </style>
</head>
<body onload="init()">
    <div id="toast">Message</div>
    
    <div id="app-shell">
        <!-- SIDEBAR (PC/TABLET) -->
        <aside id="sidebar" class="hidden flex-col gap-4 bg-slate-900 p-5 rounded-[45px] border border-slate-800 shadow-2xl overflow-y-auto">
            <div class="flex items-center gap-3 mb-2">
                <div class="bg-orange-500 text-white px-3 py-1 rounded-lg font-black text-2xl italic font-comic uppercase">S</div>
                <h1 class="text-2xl font-black italic text-white font-comic tracking-tight">SQUAD 3D</h1>
            </div>
            <nav class="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-slate-800">
                <button onclick="switchTab('studio')" id="tab-btn-studio" class="tab-btn active flex-1 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all">STUDIO</button>
                <button onclick="switchTab('guide')" id="tab-btn-guide" class="tab-btn flex-1 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all">MISSION</button>
            </nav>
            <div id="sidebar-controls" class="space-y-4">
                <div class="section-card space-y-3">
                    <h3 class="text-[10px] font-black uppercase text-orange-400">1. Scene</h3>
                    <button onclick="triggerUpload('bg')" class="w-full bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase border border-slate-700 hover:border-orange-500 transition-all">Upload Background</button>
                </div>
                <div class="section-card space-y-3">
                    <h3 class="text-[10px] font-black uppercase text-orange-400">2. Figures</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="triggerUpload('charA')" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase border border-slate-700">Fig A</button>
                        <button onclick="triggerUpload('charB')" id="pc-char-b" class="bg-slate-800 py-3 rounded-xl text-[9px] font-black uppercase border border-slate-700">Fig B</button>
                    </div>
                </div>
                <div class="section-card space-y-3">
                    <h3 class="text-[10px] font-black uppercase text-orange-400">3. Dialogue</h3>
                    <div class="flex gap-2">
                        <input id="speech-input-pc" type="text" placeholder="TALK..." class="flex-1 bg-black border-2 border-slate-800 rounded-xl px-4 py-2 text-xs font-black text-white outline-none uppercase">
                        <button onclick="addSpeechBubble('pc')" class="bg-orange-600 px-4 rounded-xl font-black text-white">+</button>
                    </div>
                </div>
                <div class="section-card space-y-3">
                    <div class="flex gap-2">
                        <button onclick="flipSelected()" class="flex-1 bg-slate-800 p-2.5 rounded-xl border border-slate-700 hover:bg-slate-700"><i data-lucide="flip-horizontal" class="w-5 h-5 mx-auto"></i></button>
                        <button onclick="deleteSelected()" class="flex-1 bg-red-900/20 text-red-500 p-2.5 rounded-xl border border-red-900/50"><i data-lucide="trash-2" class="w-5 h-5 mx-auto"></i></button>
                    </div>
                    <input type="range" id="size-slider-pc" min="0.2" max="3" step="0.1" value="1" oninput="updateScale(this.value)" class="w-full accent-orange-500">
                </div>
                <button onclick="snapFrame()" class="w-full bg-gradient-to-r from-orange-500 to-red-600 py-6 rounded-[30px] text-xl font-black uppercase shadow-xl active:scale-95 transition-all text-white">SNAP FRAME</button>
            </div>
        </aside>

        <!-- MAIN VIEWPORT -->
        <main class="flex flex-col overflow-hidden h-full">
            <div id="tab-content-studio" class="tab-content active flex-grow flex flex-col overflow-hidden h-full">
                <div id="viewport" onpointerdown="handleStageDown(event)">
                    <div id="onion-skin"></div>
                    <div id="playback-overlay"><img id="playback-img" src=""></div>
                    <div id="item-layer" class="absolute inset-0 pointer-events-none"></div>
                    <div class="absolute top-4 left-4 flex items-center gap-2 bg-black/70 px-4 py-2 rounded-full border border-white/10 z-[60]"><div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div><span id="frame-count" class="text-[11px] font-black uppercase tracking-widest text-white">0 Frames</span></div>
                    
                    <!-- HUD BUTTONS -->
                    <div class="absolute bottom-8 right-6 flex flex-col gap-4 md:hidden">
                        <button onclick="flipSelected()" class="w-14 h-14 bg-blue-600 rounded-full border-4 border-black flex items-center justify-center shadow-xl"><i data-lucide="flip-horizontal-2" class="text-white"></i></button>
                        <button id="snap-fab" onclick="snapFrame()"><i data-lucide="camera" class="w-8 h-8 text-white"></i></button>
                    </div>
                    <div class="absolute bottom-8 left-10 opacity-10 font-black italic text-7xl text-white pointer-events-none uppercase font-comic">SQUAD 3D</div>
                </div>

                <!-- TIMELINE -->
                <div class="bg-slate-900 border-t border-slate-800 p-4 md:rounded-[40px] md:border md:m-2">
                    <div class="flex items-center gap-4 mb-4">
                        <button id="play-btn" onclick="togglePlay()" class="bg-emerald-500 text-black px-8 py-3 rounded-2xl font-black uppercase flex items-center gap-2 shadow-lg active:scale-95 transition-all"><i data-lucide="play" id="play-icon" class="w-5 h-5 fill-current"></i> <span id="play-text" class="text-xs">WATCH FILM</span></button>
                        <div class="flex flex-col items-center"><input type="range" min="1" max="12" value="4" class="w-24 accent-emerald-500" id="fps-slider"></div>
                        <div class="ml-auto flex gap-3">
                            <button onclick="resetEverything()" class="text-[10px] font-black text-red-500 uppercase">Clear</button>
                            <button id="btn-export" onclick="downloadFrames()" class="bg-slate-800 px-5 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-700">Export</button>
                        </div>
                    </div>
                    <div id="timeline" class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide min-h-[110px]">
                        <div id="empty-msg" class="w-full text-center text-[10px] text-slate-500 uppercase font-black opacity-40 py-10 italic">Snap frames to begin!</div>
                    </div>
                </div>
            </div>

            <!-- ONE CARD MISSION PAGE -->
            <div id="tab-content-guide" class="tab-content flex-grow overflow-y-auto p-6 flex flex-col items-center justify-center h-full bg-slate-950">
                <div class="text-center mb-8">
                    <h2 class="text-5xl font-comic uppercase text-white mb-2 leading-none">Your <span class="text-orange-500">Mission</span></h2>
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest">Identity Authenticated</p>
                </div>

                <div id="single-mission-card" class="mission-card-final flex flex-col items-center gap-6">
                    <!-- Dynamic content will show only 1 card -->
                </div>
                
                <div class="mt-8 text-center bg-blue-900/20 p-6 rounded-3xl border border-blue-900/50">
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest leading-loose">On iPhone/iPad: Hold your finger on a toy photo in your gallery to remove the background instantly! 🪄</p>
                </div>
            </div>

            <!-- MOBILE TOOLS -->
            <div id="mobile-controls" class="bg-slate-900 border-t border-slate-800 p-4 pb-2">
                <div class="h-20 mb-3 overflow-hidden">
                    <div id="tool-panel-scene" class="tool-panel active"><button onclick="triggerUpload('bg')" class="w-full bg-slate-800 py-4 rounded-2xl border-2 border-slate-700 text-[11px] font-black uppercase flex items-center justify-center gap-2"><i data-lucide="image" class="w-5 h-5 text-orange-400"></i> Set Background</button></div>
                    <div id="tool-panel-figures" class="tool-panel"><div class="grid grid-cols-2 gap-2"><button onclick="triggerUpload('charA')" class="bg-slate-800 py-4 rounded-2xl border-2 border-slate-700 text-[11px] font-black uppercase">Add Fig A</button><button onclick="triggerUpload('charB')" id="mobile-char-b" class="bg-slate-800 py-4 rounded-2xl border-2 border-slate-700 text-[11px] font-black uppercase">Add Fig B</button></div></div>
                    <div id="tool-panel-talk" class="tool-panel"><div class="flex gap-2"><input id="speech-input-mobile" type="text" placeholder="SPEECH..." class="flex-1 bg-black border-2 border-slate-800 rounded-xl px-4 py-3 text-sm font-black text-white outline-none uppercase"><button onclick="addSpeechBubble('mobile')" class="bg-orange-600 px-6 rounded-xl font-black text-2xl text-white">+</button></div></div>
                    <div id="tool-panel-edit" class="tool-panel"><div class="flex items-center gap-3"><button onclick="deleteSelected()" class="bg-red-900/20 p-4 rounded-xl border-2 border-red-900/50"><i data-lucide="trash-2" class="w-4 h-4 text-red-500"></i></button><input type="range" id="size-slider-mobile" min="0.2" max="3" step="0.1" value="1" oninput="updateScale(this.value)" class="flex-1 accent-orange-500"></div></div>
                </div>
                <div class="flex justify-around bg-black/40 p-1.5 rounded-[28px] border border-slate-800">
                    <button onclick="switchTool('scene')" id="tool-btn-scene" class="tool-btn active flex-1 py-3 rounded-2xl flex flex-col items-center gap-1"><i data-lucide="layout" class="w-4 h-4"></i><span class="text-[7px] font-black uppercase">Scene</span></button>
                    <button onclick="switchTool('figures')" id="tool-btn-figures" class="tool-btn flex-1 py-3 rounded-2xl flex flex-col items-center gap-1"><i data-lucide="users" class="w-4 h-4"></i><span class="text-[7px] font-black uppercase">Figures</span></button>
                    <button onclick="switchTool('talk')" id="tool-btn-talk" class="tool-btn flex-1 py-3 rounded-2xl flex flex-col items-center gap-1"><i data-lucide="message-circle" class="w-4 h-4"></i><span class="text-[7px] font-black uppercase">Talk</span></button>
                    <button onclick="switchTool('edit')" id="tool-btn-edit" class="tool-btn flex-1 py-3 rounded-2xl flex flex-col items-center gap-1"><i data-lucide="move" class="w-4 h-4"></i><span class="text-[7px] font-black uppercase">Adjust</span></button>
                </div>
            </div>
            <nav id="mobile-tabs" class="bg-black border-t-2 border-slate-800 flex justify-around p-3 pb-8">
                <button onclick="switchTab('studio')" id="nav-studio" class="tab-btn active flex flex-col items-center gap-1"><i data-lucide="clapperboard" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase">Studio</span></button>
                <button onclick="switchTab('guide')" id="nav-guide" class="tab-btn flex flex-col items-center gap-1"><i data-lucide="help-circle" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase">Mission</span></button>
            </nav>
        </main>
    </div>

    <input id="file-upload" type="file" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let userTier = parseInt(urlParams.get('tier')) || 1;
        if (userTier < 1 || userTier > 3) userTier = 1;

        const DRIVE_LINKS = {
            1: "https://drive.google.com/drive/folders/1o1Bvk_xizi4su1H67Nt0kcYAkA3G9Ynj?usp=sharing",
            2: "https://drive.google.com/drive/folders/1KXZgw8xA38feXgsY4D8A2tArM_9dFlE0?usp=sharing",
            3: "https://drive.google.com/drive/folders/17VNSVmer_TgGu0hTs6SDN-jBbH1MxAeH?usp=sharing"
        };

        const RANKS = ["Recruit", "Builder", "Director"];

        let selectedEl = null, activePointerId = null, dragOffset = { x: 0, y: 0 }, frames = [], isPlaying = false, playInterval = null, zCounter = 100;

        function init() { 
            lucide.createIcons(); 
            renderMissionCard(); 
            applyTierLimits();
            window.addEventListener('pointermove', handlePointerMove); 
            window.addEventListener('pointerup', handlePointerUp); 
        }

        function renderMissionCard() {
            const container = document.getElementById('single-mission-card');
            const link = DRIVE_LINKS[userTier];
            const rankName = RANKS[userTier-1].toUpperCase();
            
            container.innerHTML = `
                <div class="w-20 h-20 rounded-full bg-orange-500 border-4 border-white flex items-center justify-center text-white font-black text-3xl font-comic italic shadow-xl mb-4">${userTier}</div>
                <h3 class="text-3xl font-comic uppercase text-white tracking-widest">${rankName} PACK</h3>
                <p class="text-slate-400 text-sm leading-relaxed uppercase font-bold px-4 tracking-widest">Access granted to the ${rankName} cloud folder. Download backgrounds and characters for free!</p>
                <a href="${link}" target="_blank" class="w-full bg-emerald-600 py-6 rounded-3xl text-sm font-black uppercase text-white shadow-xl hover:bg-emerald-500 transition-all">Open Folder</a>
            `;
        }

        function applyTierLimits() {
            if (userTier < 2) {
                document.getElementById('pc-char-b').classList.add('tier-locked');
                document.getElementById('mobile-char-b').classList.add('tier-locked');
            }
            if (userTier < 3) {
                document.getElementById('btn-export').classList.add('tier-locked');
            }
            showToast(`Rank: ${RANKS[userTier-1]}`);
        }

        function showToast(msg) { 
            const t = document.getElementById('toast'); 
            t.innerText = msg; t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3000); 
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-content-${tab}`).classList.add('active');
            document.querySelectorAll(tab === 'studio' ? '#tab-btn-studio, #nav-studio' : '#tab-btn-guide, #nav-guide').forEach(b => b.classList.add('active'));
            const mc = document.getElementById('mobile-controls'); if (mc) mc.style.display = (tab === 'studio') ? 'block' : 'none';
            lucide.createIcons();
        }

        function switchTool(tool) {
            document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tool-panel-${tool}`).classList.add('active');
            document.getElementById(`tool-btn-${tool}`).classList.add('active');
            lucide.createIcons();
        }

        let currentSlot = '';
        function triggerUpload(slot) { 
            if (slot === 'charB' && userTier < 2) return showToast("Rank 2 Needed!");
            currentSlot = slot; 
            document.getElementById('file-upload').click(); 
        }

        function handleFileUpload(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                if (currentSlot === 'bg') document.getElementById('viewport').style.backgroundImage = `url(${ev.target.result})`;
                else createMovableItem(`<img src="${ev.target.result}" draggable="false">`);
                e.target.value = '';
            }; r.readAsDataURL(f);
        }

        function addSpeechBubble(ctx) {
            const id = ctx === 'pc' ? 'speech-input-pc' : 'speech-input-mobile';
            const val = document.getElementById(id).value; if (!val.trim()) return;
            const html = `<div class="speech-container"><div class="bubble-body">${val}</div><svg class="bubble-tail-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L100,0 L40,100 Z" fill="white" stroke="black" stroke-width="12" vector-effect="non-scaling-stroke" /></svg></div>`;
            createMovableItem(html); document.getElementById(id).value = '';
        }

        function createMovableItem(html) {
            const el = document.createElement('div'); el.className = "movable"; el.innerHTML = html; el.style.left = "30%"; el.style.top = "25%"; el.dataset.scale = 1; el.dataset.flipped = "false";
            el.onpointerdown = (e) => { 
                e.stopPropagation(); selectItem(el); zCounter++; el.style.zIndex = zCounter;
                activePointerId = e.pointerId; 
                const r = el.getBoundingClientRect();
                dragOffset.x = e.clientX - r.left; 
                dragOffset.y = e.clientY - r.top; 
                el.setPointerCapture(e.pointerId);
            };
            document.getElementById('viewport').appendChild(el); selectItem(el); applyTransform(el);
        }

        function selectItem(el) { 
            if (selectedEl) selectedEl.classList.remove('selected'); 
            selectedEl = el; selectedEl.classList.add('selected'); 
            const pc = document.getElementById('size-slider-pc'), mo = document.getElementById('size-slider-mobile'); 
            if(pc) pc.value = el.dataset.scale; if(mo) mo.value = el.dataset.scale; 
            if (window.innerWidth < 768) switchTool('edit'); 
        }

        function handleStageDown() { if (selectedEl) { selectedEl.classList.remove('selected'); selectedEl = null; } }

        function handlePointerMove(e) { 
            if (!selectedEl || activePointerId === null || e.pointerId !== activePointerId) return; 
            const v = document.getElementById('viewport').getBoundingClientRect(); 
            selectedEl.style.left = (e.clientX - v.left - dragOffset.x) + 'px'; 
            selectedEl.style.top = (e.clientY - v.top - dragOffset.y) + 'px'; 
        }

        function handlePointerUp() { activePointerId = null; }
        function applyTransform(el) { const s = el.dataset.scale, f = el.dataset.flipped === "true" ? -1 : 1; el.style.transform = `scale(${s * f}, ${s})`; }
        function updateScale(v) { if(selectedEl) { selectedEl.dataset.scale = v; applyTransform(selectedEl); } }
        function flipSelected() { if(selectedEl) { selectedEl.dataset.flipped = selectedEl.dataset.flipped === "true" ? "false" : "true"; applyTransform(selectedEl); } }
        function deleteSelected() { if(selectedEl) { selectedEl.remove(); selectedEl = null; } }

        async function snapFrame() {
            if (isPlaying) togglePlay();
            const vp = document.getElementById('viewport');
            const sel = selectedEl; if (sel) sel.classList.remove('selected');
            try {
                const canvas = await html2canvas(vp, { backgroundColor: null, scale: 1.2, useCORS: true });
                const data = canvas.toDataURL("image/png"); frames.push(data);
                if (sel) sel.classList.add('selected');
                document.getElementById('onion-skin').style.backgroundImage = `url(${data})`;
                document.getElementById('onion-skin').style.display = 'block';
                document.getElementById('frame-count').innerText = `${frames.length} Frames`;
                const timeline = document.getElementById('timeline'); const empty = document.getElementById('empty-msg'); if (empty) empty.remove();
                const thumb = document.createElement('div'); thumb.className = "timeline-thumb shadow-lg"; 
                thumb.innerHTML = `<img src="${data}">`;
                timeline.appendChild(thumb); timeline.scrollLeft = timeline.scrollWidth; 
                showToast("Snap!");
            } catch (err) { showToast("Failed"); }
        }

        function togglePlay() {
            if (frames.length < 1) return showToast("Snap first!");
            isPlaying = !isPlaying; const overlay = document.getElementById('playback-overlay'), img = document.getElementById('playback-img'), icon = document.getElementById('play-icon'), text = document.getElementById('play-text');
            if (isPlaying) {
                overlay.style.display = 'flex'; text.innerText = 'STOP'; icon.setAttribute('data-lucide', 'square');
                let i = 0; playInterval = setInterval(() => { img.src = frames[i]; i = (i + 1) % frames.length; }, 1000 / document.getElementById('fps-slider').value);
            } else { clearInterval(playInterval); overlay.style.display = 'none'; text.innerText = 'WATCH FILM'; icon.setAttribute('data-lucide', 'play'); }
            lucide.createIcons();
        }

        function resetEverything() { if(!confirm("Clear Movie?")) return; frames = []; document.getElementById('timeline').innerHTML = '<div id="empty-msg" class="w-full text-center text-[10px] text-slate-500 uppercase font-black opacity-40 py-10 italic">Snap frames to begin!</div>'; document.getElementById('frame-count').innerText = '0 Frames'; document.getElementById('onion-skin').style.display = 'none'; document.getElementById('viewport').style.backgroundImage = 'none'; document.querySelectorAll('.movable').forEach(m => m.remove()); }
        function downloadFrames() { if (userTier < 3) return showToast("Director Export Needed!"); frames.forEach((f, i) => { const a = document.createElement('a'); a.download = `frame_${i+1}.png`; a.href = f; a.click(); }); }
    </script>
</body>
</html>
